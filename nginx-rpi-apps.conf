# /etc/nginx/sites-available/rpi-apps
# Single port 80 entry point for all RPi apps

proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=appcache:10m max_size=100m inactive=10m;

server {
    listen 80;
    server_name _;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Static cache headers (only for web-terminal root app)
    location ~* ^/(?!risiko|fantai|aifun).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        proxy_pass http://127.0.0.1:8080;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Web Terminal (default)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # API cache (short TTL for stats)
    location /api/system/stats {
        proxy_pass http://127.0.0.1:8080;
        proxy_cache appcache;
        proxy_cache_valid 200 2s;
        proxy_set_header Host $host;
    }

    # RISIKO
    location /risiko/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types text/html application/javascript;
        sub_filter 'href="/static/' 'href="/risiko/static/';
        sub_filter 'src="/static/' 'src="/risiko/static/';
        sub_filter "'/static/" "'/risiko/static/";
        sub_filter "'/api/" "'/risiko/api/";
        sub_filter '`/api/' '`/risiko/api/';
        sub_filter '"/api/' '"/risiko/api/';
        sub_filter '/ws/' '/risiko/ws/';
    }

    # FantAI
    location /fantai/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'href="/static/' 'href="/fantai/static/';
        sub_filter 'src="/static/' 'src="/fantai/static/';
        sub_filter "'/api/" "'/fantai/api/";
        sub_filter '"/api/' '"/fantai/api/';
        sub_filter '`/api/' '`/fantai/api/';
    }

    # AiFun
    location /aifun/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'href="/assets/' 'href="/aifun/assets/';
        sub_filter 'src="/assets/' 'src="/aifun/assets/';
    }
}
